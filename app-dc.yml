version: '3.2'
services:
  appRapids:
    image: enpassant/rapids:1.0-SNAPSHOT
    ports:
      - "8090:8080"
    environment:
      VIRTUAL_HOST_WEIGHT: 1
      SERVICE_PORTS: "8080"
      VIRTUAL_HOST: "*"
      JAVA_OPTS: "-Dakka.contrib.persistence.mongodb.mongo.mongouri=mongodb://mongodb:27017/store"
